<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 绿色圆角背景 -->
  <rect width="512" height="512" rx="110" fill="#10b981"/>

  <!-- 哑铃横杆 -->
  <rect x="181" y="236" width="150" height="40" rx="8" fill="white"/>

  <!-- 左侧重量片（外层白色） -->
  <rect x="118" y="182" width="63" height="148" rx="14" fill="white"/>
  <!-- 左侧重量片（内层挖空，体现立体感） -->
  <rect x="132" y="204" width="35" height="104" rx="8" fill="#059669"/>

  <!-- 右侧重量片（外层白色） -->
  <rect x="331" y="182" width="63" height="148" rx="14" fill="white"/>
  <!-- 右侧重量片（内层挖空） -->
  <rect x="345" y="204" width="35" height="104" rx="8" fill="#059669"/>
</svg>
